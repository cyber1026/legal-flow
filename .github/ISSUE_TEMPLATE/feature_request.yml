name: Feature request
description: 提出功能、架构或产品改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 说明这个功能要解决的真实场景。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 如果你已有实现思路，请描述数据流、接口或 UI 变化。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 说明你考虑过但不采用的方案。
  - type: checkboxes
    id: scope
    attributes:
      label: 影响范围
      options:
        - label: 后端 API
        - label: 前端交互
        - label: 合同审查 agent
        - label: 法律知识库 / 检索
        - label: 评测
        - label: 部署配置
